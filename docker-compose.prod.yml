# Production-Compose — pullt das vorgebaute Image aus GHCR.
#
# Setup:
#   1. Lege .env neben dieser Datei an (siehe .env.example)
#   2. docker compose -f docker-compose.prod.yml up -d
#
# Updates:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  mini-beer-tracker:
    image: ghcr.io/shroomlife/mini-beer-tracker:latest
    container_name: mini-beer-tracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Fallbacks, werden von .env überschrieben
      DATABASE_URL: "file:/data/mini-beer.db"
      NODE_ENV: production
    volumes:
      - mini-beer-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/spots"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mini-beer-data:
