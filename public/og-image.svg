<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDFBF4"/>
      <stop offset="100%" stop-color="#EEE5CC"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E5D3F"/>
      <stop offset="100%" stop-color="#114530"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid of dots -->
  <g opacity="0.08" fill="#1E5D3F">
    <circle cx="100" cy="100" r="2"/>
    <circle cx="200" cy="100" r="2"/>
    <circle cx="300" cy="100" r="2"/>
    <circle cx="400" cy="100" r="2"/>
    <circle cx="100" cy="200" r="2"/>
    <circle cx="200" cy="200" r="2"/>
    <circle cx="300" cy="200" r="2"/>
  </g>

  <!-- Green panel right -->
  <g transform="translate(760 0)">
    <rect x="0" y="60" width="440" height="510" rx="32" fill="url(#panel)"/>
    <!-- Map pins -->
    <g transform="translate(50 120)">
      <circle cx="80" cy="80" r="28" fill="#FDFBF4"/>
      <text x="80" y="88" text-anchor="middle" font-family="Georgia, serif" font-weight="600" font-size="22" fill="#114530">3</text>
    </g>
    <g transform="translate(260 210)">
      <circle cx="40" cy="40" r="22" fill="#C89D5F"/>
      <text x="40" y="47" text-anchor="middle" font-family="Georgia, serif" font-weight="600" font-size="16" fill="#FDFBF4">1</text>
    </g>
    <g transform="translate(100 380)">
      <circle cx="40" cy="40" r="22" fill="#FDFBF4"/>
      <text x="40" y="47" text-anchor="middle" font-family="Georgia, serif" font-weight="600" font-size="16" fill="#114530">2</text>
    </g>
    <g transform="translate(300 420)">
      <circle cx="35" cy="35" r="20" fill="#B94A3B"/>
      <text x="35" y="41" text-anchor="middle" font-family="Georgia, serif" font-weight="600" font-size="14" fill="#FDFBF4">1</text>
    </g>
  </g>

  <!-- Left text -->
  <g transform="translate(70 170)">
    <text font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#A67B3E" letter-spacing="4">
      <tspan>BERLIN · CROWDSOURCED</tspan>
    </text>

    <text font-family="Georgia, 'Playfair Display', serif" font-size="90" font-weight="600" fill="#0B1614" letter-spacing="-2">
      <tspan x="0" y="100">Mini Beer</tspan>
      <tspan x="0" y="200">Tracker.</tspan>
    </text>

    <text font-family="Inter, sans-serif" font-size="24" font-weight="400" fill="#3A4844">
      <tspan x="0" y="280">Das Späti-Verzeichnis für die kleinen</tspan>
      <tspan x="0" y="316">0,15-Liter-Heinekens — gemeinsam gepflegt.</tspan>
    </text>

    <g transform="translate(0 380)">
      <rect x="0" y="0" width="210" height="54" rx="27" fill="#1E5D3F"/>
      <text x="105" y="35" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#FDFBF4">
        beer.shroomlife.de
      </text>
    </g>
  </g>
</svg>
