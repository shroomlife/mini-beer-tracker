<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#FDFBF4"/>

  <!-- Subtle cream-100 accent panel bottom -->
  <rect x="0" y="520" width="1200" height="110" fill="#F8F3E6"/>

  <!-- Left: bottle mark, big -->
  <g transform="translate(180 175) scale(2.5)">
    <g transform="translate(48 14) rotate(-6)">
      <rect x="-13" y="-7" width="26" height="14" rx="3" fill="#C89D5F"/>
      <rect x="-13" y="-7" width="26" height="3" rx="1.5" fill="#A67B3E"/>
    </g>
    <path d="M 35 22 L 35 40 Q 35 46 31 50 L 31 108 Q 31 118 41 118 L 55 118 Q 65 118 65 108 L 65 50 Q 61 46 61 40 L 61 22 Z" fill="#1E5D3F"/>
    <rect x="38" y="28" width="3" height="16" rx="1.5" fill="#2F7A54"/>
    <rect x="33" y="72" width="30" height="20" fill="#FDFBF4"/>
    <circle cx="48" cy="82" r="2" fill="#C89D5F"/>
  </g>

  <!-- Right: wordmark stacked -->
  <g transform="translate(490 240)">
    <text font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="700" fill="#0B1614" letter-spacing="-3">
      <tspan x="0" y="0">Mini Beer</tspan>
      <tspan x="0" y="105">Tracker</tspan>
    </text>
    <text font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="500" fill="#3A4844">
      <tspan x="0" y="175">Kleine Biere in Berliner Spätis.</tspan>
    </text>
  </g>

  <!-- Bottom bar URL -->
  <text x="600" y="590" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#7A8682" letter-spacing="0.5">
    beer.shroomlife.de
  </text>
</svg>
