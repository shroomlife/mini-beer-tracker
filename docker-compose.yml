# Dev / Self-Build Compose — baut das Image lokal aus diesem Repo.
# Für Deployment mit vorgebautem GHCR-Image: siehe docker-compose.prod.yml

services:
  mini-beer-tracker:
    build: .
    container_name: mini-beer-tracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/data/mini-beer.db"
      NODE_ENV: production
    volumes:
      - mini-beer-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/spots"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mini-beer-data:
